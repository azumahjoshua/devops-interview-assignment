services:
  postgres:
    image: postgres:16-alpine
    container_name: iam-takehome-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: iam-takehome-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      # Login events persist to Postgres because the realm sets eventsEnabled=true
      # (see keycloak/realm-export.json), and `make up` seeds backdated LOGIN
      # events so the event-based approach is usable too.
      # Exposes /health/{ready,live} on the management port (9000) for the
      # readiness/liveness probes you'll write in deploy/.
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    # No container healthcheck here on purpose: this Keycloak image ships no
    # curl/wget, so an in-container HTTP check would be a brittle hack. `make up`
    # gates on readiness with a host-side curl poll instead (see Makefile).

volumes:
  postgres_data:
